      - JWT_SECRET=${JWT_SECRET}
      - STRATEGY_ENGINE_URL=${STRATEGY_ENGINE_URL}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - "${PORT_OPTIMIZER:-3002}:${PORT_OPTIMIZER:-3002}"
    depends_on:
      - postgres
      - redis
      - engine-strategy
    restart: unless-stopped
