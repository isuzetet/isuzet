# ===================================================================
# RUIT CBE LaaS Platform — Production Docker Compose
# ===================================================================
# This file defines all 13 engines + workers + infrastructure
# for production deployment
# ===================================================================

version: '3.9'

services:
  # ── INFRASTRUCTURE SERVICES ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ruit_postgres_prod
    environment:
      POSTGRES_USER: ruit
      POSTGRES_PASSWORD: ${DATABASE_URL:?DATABASE_URL not set}
      POSTGRES_DB: ruit_cbe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ruit -d ruit_cbe"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:2.13.0-pg16
    container_name: ruit_timescaledb_prod
    environment:
      POSTGRES_USER: ruit
      POSTGRES_PASSWORD: ${TIMESCALE_URL:?TIMESCALE_URL not set}
      POSTGRES_DB: ruit_ts
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ruit -d ruit_ts"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ruit_redis_prod
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: ruit_minio_prod
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── ENGINE 1: IDENTITY (PORT 3001) ─────────────────────────────────
  engine-identity:
    image: node:20-alpine
    container_name: ruit_engine_identity
    working_dir: /app
    volumes:
      - ../:/app
    command: node apps/engine-identity/dist/index.js
    environment:
      - NODE_ENV=production
      - PORT=${PORT_IDENTITY:-3001}
      - DATABASE_URL=${DATABASE_URL}
      - TIMESCALE_URL=${TIMESCALE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - REFRESH_SECRET=${REFRESH_SECRET}
      - OTP_TTL_SECONDS=${OTP_TTL_SECONDS:-300}
      - OTP_MAX_ATTEMPTS=${OTP_MAX_ATTEMPTS:-3}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - "${PORT_IDENTITY:-3001}:${PORT_IDENTITY:-3001}"
    depends_on:
      - postgres
      - redis
      - timescaledb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT_IDENTITY:-3001}/api/v1/identity/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── ENGINE 2: OPTIMIZER (PORT 3002) ────────────────────────────────
  engine-optimizer:
    image: node:20-alpine
