name: isuzet_field
description: ISUZET Field App for drivers and agents
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  dio: ^5.4.3
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0
  geolocator: ^12.0.0
  google_maps_flutter: ^2.6.1
  image_picker: ^1.1.2
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^18.0.0
  connectivity_plus: ^6.0.3
  intl: ^0.19.0
  phone_numbers_parser: ^9.0.20
  cached_network_image: ^3.3.1
  go_router: ^14.2.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  qr_flutter: ^4.1.0
  camera: ^0.11.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
